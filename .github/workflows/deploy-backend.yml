name: Deploy Backend (ECS)

on:
  push:
    branches: ["main"]
    paths:
      - "services/api/**"
      - "services/model/**"
      - ".aws/**"
      - ".github/workflows/deploy-backend.yml"

env:
  AWS_REGION: us-west-2
  AWS_ACCOUNT_ID: "526261729062"
  ECR_API_REPO: reliscore-api
  ECR_MODEL_REPO: reliscore-model

  ECS_CLUSTER: reliscore
  ECS_API_SERVICE: reliscore-api-service-DRLYYB6X   # <-- replace
  ECS_MODEL_SERVICE: reliscore-model-service-ALW98PCX # <-- replace

  API_TASKDEF: .aws/taskdef-api.json
  MODEL_TASKDEF: .aws/taskdef-model.json
  API_CONTAINER_NAME: api
  MODEL_CONTAINER_NAME: model

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS creds via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::526261729062:role/reliscore-github-deploy-role  # <-- replace if different
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image vars
        id: vars
        run: |
          echo "sha=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "ecr=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> $GITHUB_OUTPUT

      - name: Build & push MODEL image
        run: |
          docker buildx create --use --name builder || true
          docker buildx build \
            --platform linux/arm64 \
            -f services/model/Dockerfile \
            -t ${{ steps.vars.outputs.ecr }}/${{ env.ECR_MODEL_REPO }}:${{ steps.vars.outputs.sha }} \
            -t ${{ steps.vars.outputs.ecr }}/${{ env.ECR_MODEL_REPO }}:latest \
            --push .

      - name: Render MODEL task definition
        id: render_model
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.MODEL_TASKDEF }}
          container-name: ${{ env.MODEL_CONTAINER_NAME }}
          image: ${{ steps.vars.outputs.ecr }}/${{ env.ECR_MODEL_REPO }}:${{ steps.vars.outputs.sha }}

      - name: Deploy MODEL service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render_model.outputs.task-definition }}
          service: ${{ env.ECS_MODEL_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Build & push API image
        run: |
          docker buildx create --use --name builder || true
          docker buildx build \
            --platform linux/arm64 \
            -f services/api/Dockerfile \
            -t ${{ steps.vars.outputs.ecr }}/${{ env.ECR_API_REPO }}:${{ steps.vars.outputs.sha }} \
            -t ${{ steps.vars.outputs.ecr }}/${{ env.ECR_API_REPO }}:latest \
            --push .

      - name: Render API task definition
        id: render_api
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.API_TASKDEF }}
          container-name: ${{ env.API_CONTAINER_NAME }}
          image: ${{ steps.vars.outputs.ecr }}/${{ env.ECR_API_REPO }}:${{ steps.vars.outputs.sha }}

      - name: Deploy API service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render_api.outputs.task-definition }}
          service: ${{ env.ECS_API_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

